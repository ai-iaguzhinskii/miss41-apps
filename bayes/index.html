<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bayesian Network Editor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252540;--accent:#7c5cfc;--accent2:#5c8afc;--text:#e0e0f0;--text2:#8888aa;--danger:#fc5c5c;--green:#4cdf8a;--radius:12px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;touch-action:none}
#toolbar{display:flex;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid #2a2a4a;flex-shrink:0;flex-wrap:wrap;align-items:center}
#toolbar button{background:var(--surface2);color:var(--text);border:1px solid #3a3a5a;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
#toolbar button:active{background:var(--accent);border-color:var(--accent)}
#toolbar button.active{background:var(--accent);border-color:var(--accent)}
#toolbar .sep{flex:1;min-width:4px}
#canvasWrap{flex:1;position:relative;min-height:0}
canvas{display:block;width:100%;height:100%}
#props{background:var(--surface);border-top:1px solid #2a2a4a;padding:12px 16px 20px;max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;display:none;position:fixed;bottom:0;left:0;right:0;z-index:20}
#props.open{display:block}
#props h3{font-size:14px;color:var(--accent);margin-bottom:8px}
.prop-row{margin-bottom:10px}
.prop-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:3px}
.prop-row input[type=text]{width:100%;background:var(--surface2);border:1px solid #3a3a5a;color:var(--text);padding:6px 10px;border-radius:6px;font-size:14px}
.prop-row input[type=range]{width:100%;accent-color:var(--accent)}
.prop-row .val{float:right;color:var(--accent);font-weight:600;font-size:12px}
#deleteNodeBtn{background:var(--danger);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;margin-top:6px}
#edgeDeleteBar{display:none;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#connectHint{display:none;position:absolute;top:50px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:6px 16px;border-radius:16px;font-size:12px;z-index:10;pointer-events:none}
</style>
</head>
<body>
<div id="toolbar">
  <button id="btnAdd">+ Узел</button>
  <button id="btnConnect">🔗</button>
  <button id="btnPreset">🇮🇷 Пресет</button>
  <div class="sep"></div>
  <button id="btnReset">Reset</button>
</div>
<div id="canvasWrap">
  <canvas id="c"></canvas>
  <div id="edgeDeleteBar" onclick="deleteSelectedEdge()">🗑 Удалить связь</div>
  <div id="connectHint">Тапни на целевой узел</div>
</div>
<div id="props">
  <div id="propsContent"></div>
</div>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const propsEl = document.getElementById('props');
const propsCont = document.getElementById('propsContent');
const edgeDelBar = document.getElementById('edgeDeleteBar');
const connectHint = document.getElementById('connectHint');

let W, H, dpr;
let nodes = [], edges = [];
let selectedNode = null, selectedEdge = null;
let dragging = null, dragOff = {x:0,y:0};
let connectMode = false, connectSource = null;
let longPressTimer = null, longPressTriggered = false;
let nextId = 1;

const NODE_R = 22;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const r = wrap.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

function probColor(p) {
  const r = Math.round(80 + 176 * p);
  const g = Math.round(200 - 120 * p);
  const b = Math.round(255 - 100 * p);
  return `rgb(${r},${g},${b})`;
}

function calcProbs() {
  // Topological sort
  const visited = new Set(), order = [];
  function visit(id) {
    if (visited.has(id)) return;
    visited.add(id);
    const pEdges = edges.filter(e => e.to === id);
    pEdges.forEach(e => visit(e.from));
    order.push(id);
  }
  nodes.forEach(n => visit(n.id));

  order.forEach(id => {
    const n = nodes.find(x => x.id === id);
    const parents = edges.filter(e => e.to === id);
    if (parents.length === 0) {
      n.prob = n.prior;
    } else if (parents.length === 1) {
      const pe = parents[0];
      const pn = nodes.find(x => x.id === pe.from);
      n.prob = pe.cpT * pn.prob + pe.cpF * (1 - pn.prob);
    } else {
      // Full enumeration over all 2^N parent state combinations
      // For each combo: P(C|combo) = average of P(C|Pi=state_i) across all parents
      const np = parents.length;
      const combos = 1 << np;
      let total = 0;
      for (let mask = 0; mask < combos; mask++) {
        let comboProb = 1;
        let cpSum = 0;
        for (let j = 0; j < np; j++) {
          const pe = parents[j];
          const pn = nodes.find(x => x.id === pe.from);
          const parentTrue = (mask >> j) & 1;
          comboProb *= parentTrue ? pn.prob : (1 - pn.prob);
          cpSum += parentTrue ? pe.cpT : pe.cpF;
        }
        total += comboProb * (cpSum / np);
      }
      n.prob = total;
    }
    n.prob = Math.max(0, Math.min(1, n.prob));
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  calcProbs();

  // Draw edges
  edges.forEach(e => {
    const from = nodes.find(n => n.id === e.from);
    const to = nodes.find(n => n.id === e.to);
    if (!from || !to) return;
    const dx = to.x - from.x, dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ux = dx/dist, uy = dy/dist;
    const sx = from.x + ux * NODE_R, sy = from.y + uy * NODE_R;
    const ex = to.x - ux * (NODE_R + 8), ey = to.y - uy * (NODE_R + 8);

    const isSel = selectedEdge === e;
    ctx.strokeStyle = isSel ? '#fc5c5c' : '#5566aa';
    ctx.lineWidth = isSel ? 3 : 2;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();

    // Arrowhead
    const aLen = 10, aAng = 0.4;
    ctx.fillStyle = ctx.strokeStyle;
    ctx.beginPath();
    ctx.moveTo(ex + ux * 8, ey + uy * 8);
    ctx.lineTo(ex - ux * aLen + (-uy) * aLen * Math.sin(aAng), ey - uy * aLen + ux * aLen * Math.sin(aAng));
    ctx.lineTo(ex - ux * aLen - (-uy) * aLen * Math.sin(aAng), ey - uy * aLen - ux * aLen * Math.sin(aAng));
    ctx.closePath(); ctx.fill();
  });

  // Draw connecting line
  if (connectMode && connectSource && dragging === null) {
    // just highlight source
    const sn = nodes.find(n => n.id === connectSource);
    if (sn) {
      ctx.strokeStyle = 'rgba(124,92,252,0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.arc(sn.x, sn.y, NODE_R + 6, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Draw nodes
  nodes.forEach(n => {
    const col = probColor(n.prob);
    const isSel = selectedNode === n;

    // Glow
    if (isSel) {
      ctx.shadowColor = 'rgba(124,92,252,0.6)';
      ctx.shadowBlur = 16;
    }

    // Circle
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(n.x, n.y, NODE_R, 0, Math.PI * 2); ctx.fill();

    if (isSel) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(n.x, n.y, NODE_R, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    // Text
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(n.prob * 100) + '%', n.x, n.y + 4);

    // Label above
    ctx.fillStyle = var_textCol(n);
    ctx.font = '11px sans-serif';
    ctx.fillText(n.name.length > 14 ? n.name.slice(0,13) + '…' : n.name, n.x, n.y - NODE_R - 6);
  });
}

function var_textCol(n) { return '#c0c0e0'; }

function nodeAt(x, y) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = x - n.x, dy = y - n.y;
    if (dx*dx + dy*dy <= (NODE_R + 8) * (NODE_R + 8)) return n;
  }
  return null;
}

function edgeAt(x, y) {
  let best = null, bestD = 14;
  edges.forEach(e => {
    const from = nodes.find(n => n.id === e.from);
    const to = nodes.find(n => n.id === e.to);
    if (!from || !to) return;
    const d = ptSegDist(x, y, from.x, from.y, to.x, to.y);
    if (d < bestD) { bestD = d; best = e; }
  });
  return best;
}

function ptSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) return Math.sqrt((px-ax)**2 + (py-ay)**2);
  let t = ((px-ax)*dx + (py-ay)*dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const cx = ax + t*dx, cy = ay + t*dy;
  return Math.sqrt((px-cx)**2 + (py-cy)**2);
}

function hasCycle(fromId, toId) {
  // Would adding fromId->toId create a cycle?
  const visited = new Set();
  function dfs(id) {
    if (id === fromId) return true;
    if (visited.has(id)) return false;
    visited.add(id);
    return edges.filter(e => e.from === id).some(e => dfs(e.to));
  }
  return dfs(toId);
}

function addEdge(fromId, toId) {
  if (fromId === toId) return;
  if (edges.some(e => e.from === fromId && e.to === toId)) return;
  if (hasCycle(fromId, toId)) return;
  edges.push({ from: fromId, to: toId, cpT: 0.8, cpF: 0.1 });
  draw();
}

function selectNode(n) {
  selectedNode = n; selectedEdge = null;
  edgeDelBar.style.display = 'none';
  if (!n) { propsEl.classList.remove('open'); draw(); return; }
  propsEl.classList.add('open');
  renderProps();
  draw();
}

function selectEdge(e) {
  selectedEdge = e; selectedNode = null;
  propsEl.classList.remove('open');
  edgeDelBar.style.display = e ? 'block' : 'none';
  draw();
}

function deleteSelectedEdge() {
  if (!selectedEdge) return;
  edges = edges.filter(e => e !== selectedEdge);
  selectedEdge = null;
  edgeDelBar.style.display = 'none';
  draw();
}

function renderProps() {
  const n = selectedNode;
  if (!n) return;
  const parents = edges.filter(e => e.to === n.id);
  let h = `<h3>${parents.length ? 'Child' : 'Root'} Node</h3>`;
  h += `<div class="prop-row"><label>Название</label><input type="text" id="pName" value="${esc(n.name)}"></div>`;

  if (parents.length === 0) {
    h += `<div class="prop-row"><label>P(True) <span class="val">${Math.round(n.prior*100)}%</span></label>`;
    h += `<input type="range" min="0" max="100" value="${Math.round(n.prior*100)}" id="pPrior"></div>`;
  } else {
    parents.forEach((pe, i) => {
      const pn = nodes.find(x => x.id === pe.from);
      const pName = pn ? pn.name : '?';
      h += `<div class="prop-row"><label>Если «${esc(pName)}» случилось <span class="val">${Math.round(pe.cpT*100)}%</span></label>`;
      h += `<input type="range" min="0" max="100" value="${Math.round(pe.cpT*100)}" data-ei="${i}" data-k="cpT" class="cpSlider"></div>`;
      h += `<div class="prop-row"><label>Если «${esc(pName)}» НЕ случилось <span class="val">${Math.round(pe.cpF*100)}%</span></label>`;
      h += `<input type="range" min="0" max="100" value="${Math.round(pe.cpF*100)}" data-ei="${i}" data-k="cpF" class="cpSlider"></div>`;
    });
  }
  h += `<button id="deleteNodeBtn" onclick="deleteNode(${n.id})">🗑 Удалить узел</button>`;
  propsCont.innerHTML = h;

  const nameIn = document.getElementById('pName');
  if (nameIn) nameIn.addEventListener('input', () => { n.name = nameIn.value; draw(); });

  const priorIn = document.getElementById('pPrior');
  if (priorIn) priorIn.addEventListener('input', () => {
    n.prior = priorIn.value / 100;
    priorIn.previousElementSibling.querySelector('.val').textContent = priorIn.value + '%';
    draw();
  });

  document.querySelectorAll('.cpSlider').forEach(sl => {
    sl.addEventListener('input', () => {
      const ei = +sl.dataset.ei, k = sl.dataset.k;
      const pe = parents[ei];
      if (pe) { pe[k] = sl.value / 100; sl.previousElementSibling.querySelector('.val').textContent = sl.value + '%'; draw(); }
    });
  });
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  if (selectedNode && selectedNode.id === id) selectNode(null);
  draw();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function addNode(name, x, y, prior) {
  const n = { id: nextId++, name: name || 'Узел ' + nextId, x: x || 50 + Math.random() * (W - 100), y: y || 40 + Math.random() * (H - 80), prior: prior ?? 0.5, prob: prior ?? 0.5 };
  nodes.push(n);
  draw();
  return n;
}

// Pointer handling
function getXY(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

function onDown(e) {
  e.preventDefault();
  const p = getXY(e);
  longPressTriggered = false;

  const n = nodeAt(p.x, p.y);
  if (n) {
    if (connectMode && connectSource && connectSource !== n.id) {
      addEdge(connectSource, n.id);
      connectSource = null;
      connectMode = false;
      document.getElementById('btnConnect').classList.remove('active');
      connectHint.style.display = 'none';
      selectNode(n);
      renderProps();
      return;
    }
    if (connectMode) {
      connectSource = n.id;
      connectHint.style.display = 'block';
      draw();
      return;
    }
    dragging = n;
    dragOff.x = p.x - n.x; dragOff.y = p.y - n.y;
    selectNode(n);

    // Long press for connect
    longPressTimer = setTimeout(() => {
      longPressTriggered = true;
      dragging = null;
      connectMode = true;
      connectSource = n.id;
      document.getElementById('btnConnect').classList.add('active');
      connectHint.style.display = 'block';
      draw();
    }, 500);
    return;
  }

  // Check edge
  const eg = edgeAt(p.x, p.y);
  if (eg) { selectEdge(eg); return; }

  // Deselect — only close props on canvas tap, not on panel scroll
  selectNode(null); selectEdge(null);
  if (connectMode) {
    connectMode = false; connectSource = null;
    document.getElementById('btnConnect').classList.remove('active');
    connectHint.style.display = 'none';
    draw();
  }
}

function onMove(e) {
  e.preventDefault();
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  if (!dragging) return;
  const p = getXY(e);
  dragging.x = p.x - dragOff.x;
  dragging.y = p.y - dragOff.y;
  draw();
}

function onUp(e) {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  dragging = null;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);

// Prevent props panel touch events from reaching canvas
propsEl.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
propsEl.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
propsEl.addEventListener('touchend', e => e.stopPropagation(), { passive: true });

// Toolbar
document.getElementById('btnAdd').addEventListener('click', () => {
  const n = addNode();
  selectNode(n);
});

document.getElementById('btnConnect').addEventListener('click', () => {
  connectMode = !connectMode;
  connectSource = null;
  document.getElementById('btnConnect').classList.toggle('active', connectMode);
  connectHint.style.display = connectMode && selectedNode ? 'block' : 'none';
  if (connectMode && selectedNode) connectSource = selectedNode.id;
  draw();
});

document.getElementById('btnReset').addEventListener('click', () => {
  nodes = []; edges = []; nextId = 1;
  selectNode(null); selectEdge(null);
  draw();
});

document.getElementById('btnPreset').addEventListener('click', loadPreset);

function loadPreset() {
  nodes = []; edges = []; nextId = 1;
  selectNode(null); selectEdge(null);

  const cx = W / 2, cy = H / 2 - 20;
  const n1 = addNode('Удар по ОАЭ', cx - 160, cy - 100, 0.05);
  const n2 = addNode('Перемирие сорвано', cx + 120, cy - 100, 0.40);
  const n3 = addNode('Хуситы активны', cx - 160, cy + 40, 0.60);
  const n4 = addNode('ОАЭ vs Иран', cx + 120, cy + 40, 0.35);
  const n5 = addNode('Риск удара', cx, cy + 150, 0.5);

  addEdge(n1.id, n5.id);
  addEdge(n2.id, n5.id);
  addEdge(n3.id, n5.id);
  addEdge(n4.id, n5.id);

  edges.forEach(e => { if (e.to === n5.id) { e.cpT = 0.8; e.cpF = 0.05; } });
  draw();
}

// Init
resize();

// Telegram WebApp
try { if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); } } catch(e) {}
</script>
</body>
</html>
