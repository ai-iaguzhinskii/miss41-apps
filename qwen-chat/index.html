<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Qwen Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
#header{padding:12px 16px;background:#16213e;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0f3460}
#header h1{font-size:16px;font-weight:600;color:#a78bfa}
#clear{background:none;border:1px solid #444;color:#999;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
#clear:hover{border-color:#a78bfa;color:#a78bfa}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.user{align-self:flex-end;background:#7c3aed;color:#fff;border-bottom-right-radius:4px}
.bot{align-self:flex-start;background:#2a2a4a;color:#e0e0e0;border-bottom-left-radius:4px}
#typing{padding:4px 16px;font-size:13px;color:#888;min-height:22px}
#input-area{padding:10px 12px;background:#16213e;display:flex;gap:8px;border-top:1px solid #0f3460}
#input{flex:1;background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:10px 14px;border-radius:20px;font-size:14px;outline:none;resize:none;max-height:100px}
#input:focus{border-color:#7c3aed}
#send{background:#7c3aed;border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
#send:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<div id="header"><h1>Qwen 3.5 VL</h1><button id="clear">Очистить</button></div>
<div id="messages"></div>
<div id="typing"></div>
<div id="input-area">
<textarea id="input" rows="1" placeholder="Сообщение..."></textarea>
<button id="send">↑</button>
</div>
<script>
if(window.Telegram?.WebApp)Telegram.WebApp.ready();
const msgs=document.getElementById('messages'),inp=document.getElementById('input'),btn=document.getElementById('send'),typ=document.getElementById('typing');
let history=[],busy=false,ws=null;
function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'bot');
  d.textContent=text;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  return d;
}
function send(){
  const t=inp.value.trim();if(!t||busy)return;
  busy=true;btn.disabled=true;inp.value='';inp.style.height='auto';
  history.push({role:'user',content:t});
  addMsg('user',t);
  const el=addMsg('assistant','');
  typ.textContent='печатает...';
  let full='';
  const wsUrl = 'wss://skirmish-avenue-contrite.ngrok-free.dev/ws/chat';
  ws=new WebSocket(wsUrl);
  ws.onopen=()=>ws.send(JSON.stringify({messages:history,max_tokens:1000}));
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='token'){full+=d.text;el.textContent=full;msgs.scrollTop=msgs.scrollHeight}
    if(d.type==='done'){history.push({role:'assistant',content:full});typ.textContent='';busy=false;btn.disabled=false;ws.close()}
  };
  ws.onerror=()=>{typ.textContent='Ошибка соединения';busy=false;btn.disabled=false};
}
btn.onclick=send;
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px'});
document.getElementById('clear').onclick=()=>{history=[];msgs.innerHTML='';};
</script>
</body>
</html>
