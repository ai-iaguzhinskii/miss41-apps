<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Qwen Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
#header{padding:12px 16px;background:#16213e;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0f3460}
#header h1{font-size:16px;font-weight:600;color:#a78bfa}
#header-btns{display:flex;gap:6px}
.hdr-btn{background:none;border:1px solid #444;color:#999;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
.hdr-btn:hover{border-color:#a78bfa;color:#a78bfa}
#settings-panel{display:none;padding:10px 16px;background:#16213e;border-bottom:1px solid #0f3460;flex-wrap:wrap;gap:8px}
.setting-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.setting-label{font-size:13px;color:#aaa;min-width:110px}
.tog{background:#2a2a4a;border:1px solid #444;color:#999;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.tog.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.user{align-self:flex-end;background:#7c3aed;color:#fff;border-bottom-right-radius:4px}
.bot{align-self:flex-start;background:#2a2a4a;color:#e0e0e0;border-bottom-left-radius:4px}
#typing{padding:4px 16px;font-size:13px;color:#888;min-height:22px}
#input-area{padding:10px 12px;background:#16213e;display:flex;gap:8px;border-top:1px solid #0f3460}
#input{flex:1;background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:10px 14px;border-radius:20px;font-size:14px;outline:none;resize:none;max-height:100px}
#input:focus{border-color:#7c3aed}
#send{background:#7c3aed;border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
#send:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<div id="header"><h1>Qwen 3.5 VL</h1><div id="header-btns"><button class="hdr-btn" id="settings-btn">⚙️</button><button class="hdr-btn" id="clear">Очистить</button></div></div>
<div id="settings-panel">
<div class="setting-row"><span class="setting-label">🧠 Thinking</span><button class="tog" data-g="thinking" data-v="true">ON</button><button class="tog active" data-g="thinking" data-v="false">OFF</button></div>
<div class="setting-row"><span class="setting-label">🌡 Temperature</span><button class="tog" data-g="temp" data-v="0">0.0</button><button class="tog" data-g="temp" data-v="0.7">0.7</button><button class="tog active" data-g="temp" data-v="1">1.0</button></div>
<div class="setting-row"><span class="setting-label">📏 Max tokens</span><button class="tog" data-g="maxtok" data-v="1000">1000</button><button class="tog active" data-g="maxtok" data-v="3000">3000</button><button class="tog" data-g="maxtok" data-v="8000">8000</button></div>
</div>
<div id="messages"></div>
<div id="typing"></div>
<div id="input-area">
<textarea id="input" rows="1" placeholder="Сообщение..."></textarea>
<button id="send">↑</button>
</div>
<script>
if(window.Telegram?.WebApp)Telegram.WebApp.ready();
const msgs=document.getElementById('messages'),inp=document.getElementById('input'),btn=document.getElementById('send'),typ=document.getElementById('typing');
let history=[],busy=false,ws=null;

// Settings
const DEFAULTS={thinking:false,temp:1,maxtok:3000};
function loadSettings(){try{return JSON.parse(localStorage.getItem('qwen_settings'))||{...DEFAULTS}}catch{return{...DEFAULTS}}}
function saveSettings(s){localStorage.setItem('qwen_settings',JSON.stringify(s))}
let settings=loadSettings();

// Settings panel toggle
document.getElementById('settings-btn').onclick=()=>{const p=document.getElementById('settings-panel');p.style.display=p.style.display==='flex'?'none':'flex'};

// Init toggle buttons from settings
function syncToggles(){document.querySelectorAll('.tog').forEach(b=>{const g=b.dataset.g,v=b.dataset.v;let cur;if(g==='thinking')cur=String(settings.thinking);else if(g==='temp')cur=String(settings.temp);else cur=String(settings.maxtok);b.classList.toggle('active',v===cur)})}
syncToggles();

document.getElementById('settings-panel').addEventListener('click',e=>{const b=e.target;if(!b.classList.contains('tog'))return;const g=b.dataset.g,v=b.dataset.v;if(g==='thinking')settings.thinking=v==='true';else if(g==='temp')settings.temp=parseFloat(v);else settings.maxtok=parseInt(v);saveSettings(settings);syncToggles()});
function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'bot');
  d.textContent=text;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  return d;
}
function send(){
  const t=inp.value.trim();if(!t||busy)return;
  busy=true;btn.disabled=true;inp.value='';inp.style.height='auto';
  history.push({role:'user',content:t});
  addMsg('user',t);
  const el=addMsg('assistant','');
  typ.textContent='печатает...';
  let full='';
  const wsUrl = 'wss://skirmish-avenue-contrite.ngrok-free.dev/ws/chat';
  ws=new WebSocket(wsUrl);
  ws.onopen=()=>ws.send(JSON.stringify({messages:history,enable_thinking:settings.thinking,temperature:settings.temp,max_tokens:settings.maxtok}));
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='token'){full+=d.text;el.textContent=full;msgs.scrollTop=msgs.scrollHeight}
    if(d.type==='done'){history.push({role:'assistant',content:full});typ.textContent='';busy=false;btn.disabled=false;ws.close()}
  };
  ws.onerror=()=>{typ.textContent='Ошибка соединения';busy=false;btn.disabled=false};
}
btn.onclick=send;
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px'});
document.getElementById('clear').onclick=()=>{history=[];msgs.innerHTML='';};
</script>
</body>
</html>
