<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gemma Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#header{padding:10px 16px;background:#141414;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;flex-shrink:0}
#header h1{font-size:15px;font-weight:600;color:#4ade80}
#header-right{display:flex;align-items:center;gap:8px}
#model-badge{font-size:10px;color:#4ade80;background:#0d2a0d;border:1px solid #1a4a1a;padding:2px 8px;border-radius:10px}
.hdr-btn{background:none;border:1px solid #2a2a2a;color:#666;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px}
.hdr-btn:hover{border-color:#4ade80;color:#4ade80}

#settings-panel{display:none;padding:10px 16px;background:#141414;border-bottom:1px solid #222;flex-direction:column;gap:8px;flex-shrink:0}
.setting-row{display:flex;align-items:center;gap:8px}
.setting-label{font-size:12px;color:#777;min-width:110px}
.tog{background:#1a1a1a;border:1px solid #2a2a2a;color:#666;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.tog.active{background:#0d2a0d;border-color:#4ade80;color:#4ade80}

#messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}

.msg{max-width:84%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-wrap:break-word}
.user{align-self:flex-end;background:#166534;color:#dcfce7;border-bottom-right-radius:4px}
.bot{align-self:flex-start;background:#1a1a1a;color:#e0e0e0;border-bottom-left-radius:4px;border:1px solid #222}
.bot.error{background:#1a0a0a;border-color:#4a1a1a;color:#f87171}

.thinking-block{align-self:flex-start;max-width:84%;background:#111;border:1px solid #1e3a1e;border-radius:12px;padding:8px 12px;font-size:12px;color:#4a7a4a;line-height:1.5;word-wrap:break-word;font-style:italic}
.thinking-block::before{content:"💭 ";font-style:normal}

#typing{padding:3px 16px;font-size:12px;color:#444;min-height:18px;flex-shrink:0}

#input-area{padding:10px 12px;background:#141414;display:flex;gap:8px;align-items:flex-end;border-top:1px solid #222;flex-shrink:0}
#input{flex:1;background:#1a1a1a;border:1px solid #222;color:#e0e0e0;padding:10px 14px;border-radius:16px;font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.4}
#input:focus{border-color:#4ade80}
#input::placeholder{color:#333}
#send{background:#166534;border:none;color:#4ade80;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#send:disabled{opacity:.25;cursor:default}
</style>
</head>
<body>
<div id="header">
  <h1>Gemma Chat</h1>
  <div id="header-right">
    <span id="model-badge">gemma4-crack</span>
    <button class="hdr-btn" id="settings-btn">⚙️</button>
    <button class="hdr-btn" id="clear-btn">Очистить</button>
  </div>
</div>
<div id="settings-panel">
  <div class="setting-row">
    <span class="setting-label">🌡 Temperature</span>
    <button class="tog" data-g="temp" data-v="0">0.0</button>
    <button class="tog active" data-g="temp" data-v="0.7">0.7</button>
    <button class="tog" data-g="temp" data-v="1">1.0</button>
  </div>
  <div class="setting-row">
    <span class="setting-label">📏 Max tokens</span>
    <button class="tog" data-g="maxtok" data-v="1000">1k</button>
    <button class="tog active" data-g="maxtok" data-v="3000">3k</button>
    <button class="tog" data-g="maxtok" data-v="8000">8k</button>
  </div>
  <div class="setting-row">
    <span class="setting-label">💭 Thinking</span>
    <button class="tog active" data-g="thinking" data-v="show">Показывать</button>
    <button class="tog" data-g="thinking" data-v="hide">Скрывать</button>
  </div>
</div>
<div id="messages"></div>
<div id="typing"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Сообщение..."></textarea>
  <button id="send">↑</button>
</div>
<script>
if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}

const msgs=document.getElementById('messages'),inp=document.getElementById('input'),
      btn=document.getElementById('send'),typ=document.getElementById('typing');

let history=[],busy=false,ws=null;

const DEFAULTS={temp:0.7,maxtok:3000,thinking:'show'};
function loadS(){try{return JSON.parse(localStorage.getItem('gemma_s'))||{...DEFAULTS}}catch{return{...DEFAULTS}}}
function saveS(s){localStorage.setItem('gemma_s',JSON.stringify(s))}
let S=loadS();

document.getElementById('settings-btn').onclick=()=>{
  const p=document.getElementById('settings-panel');
  p.style.display=p.style.display==='flex'?'none':'flex';
};

function syncT(){
  document.querySelectorAll('.tog').forEach(b=>{
    const g=b.dataset.g,v=b.dataset.v;
    const cur=g==='temp'?String(S.temp):g==='maxtok'?String(S.maxtok):S.thinking;
    b.classList.toggle('active',v===cur);
  });
}
syncT();
document.getElementById('settings-panel').addEventListener('click',e=>{
  const b=e.target;if(!b.classList.contains('tog'))return;
  const g=b.dataset.g,v=b.dataset.v;
  if(g==='temp')S.temp=parseFloat(v);
  else if(g==='maxtok')S.maxtok=parseInt(v);
  else S.thinking=v;
  saveS(S);syncT();
});

function addMsg(role,text,cls){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'bot')+(cls?' '+cls:'');
  d.textContent=text;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  return d;
}

function addThinking(){
  const d=document.createElement('div');
  d.className='thinking-block';
  d.style.display=S.thinking==='show'?'block':'none';
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  return d;
}

function getWsUrl(){
  const proto=location.protocol==='https:'?'wss':'ws';
  return `${proto}://${location.host}/ws/chat`;
}

function send(){
  const t=inp.value.trim();
  if(!t||busy)return;
  busy=true;btn.disabled=true;
  inp.value='';inp.style.height='auto';
  history.push({role:'user',content:t});
  addMsg('user',t);
  let thinkEl=null,botEl=addMsg('assistant',''),full='',thinkFull='';
  typ.textContent='думает...';

  ws=new WebSocket(getWsUrl());
  ws.onopen=()=>ws.send(JSON.stringify({
    messages:history,temperature:S.temp,max_tokens:S.maxtok
  }));
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='thinking'){
      if(!thinkEl)thinkEl=addThinking();
      thinkFull+=d.text;
      thinkEl.textContent=thinkFull;
      msgs.scrollTop=msgs.scrollHeight;
    }
    if(d.type==='token'){
      if(typ.textContent==='думает...')typ.textContent='пишет...';
      full+=d.text;
      botEl.textContent=full;
      msgs.scrollTop=msgs.scrollHeight;
    }
    if(d.type==='done'){
      history.push({role:'assistant',content:full});
      typ.textContent='';busy=false;btn.disabled=false;ws.close();
    }
    if(d.type==='error'){
      botEl.textContent='⚠️ '+d.text;
      botEl.classList.add('error');
      typ.textContent='';busy=false;btn.disabled=false;ws.close();
    }
  };
  ws.onerror=()=>{
    botEl.textContent='⚠️ Нет соединения';
    botEl.classList.add('error');
    typ.textContent='';busy=false;btn.disabled=false;
  };
}

btn.onclick=send;
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
inp.addEventListener('input',()=>{
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,120)+'px';
});
document.getElementById('clear-btn').onclick=()=>{history=[];msgs.innerHTML='';};
</script>
</body>
</html>
