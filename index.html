<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Miss.41 Apps</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #1a1a2e);
    color: var(--tg-theme-text-color, #e0e0e0);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 16px;
  }
  .logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    font-size: 14px;
    color: var(--tg-theme-hint-color, #888);
    margin-top: 4px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 400px;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--tg-theme-secondary-bg-color, #252545);
    border: 1px solid rgba(168, 85, 247, 0.15);
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active {
    transform: scale(0.97);
  }
  @media (hover: hover) {
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.25);
      border-color: rgba(168, 85, 247, 0.4);
    }
  }
  .card-icon {
    font-size: 40px;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(168, 85, 247, 0.1);
    border-radius: 14px;
    flex-shrink: 0;
  }
  .card-text h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card-text p {
    font-size: 13px;
    color: var(--tg-theme-hint-color, #888);
    line-height: 1.3;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">✨</div>
    <h1>Miss.41 Apps</h1>
    <p>Мини-приложения</p>
  </div>
  <div class="cards">
    <a class="card" href="dice/index.html">
      <div class="card-icon">🎲</div>
      <div class="card-text">
        <h2>Кубики</h2>
        <p>Брось кубики и испытай удачу</p>
      </div>
    </a>
    <a class="card" href="poker/index.html">
      <div class="card-icon">🃏</div>
      <div class="card-text">
        <h2>Покер</h2>
        <p>Техасский холдем с друзьями</p>
      </div>
    </a>
    <a class="card" href="bayes/index.html">
      <div class="card-icon">🔢</div>
      <div class="card-text">
        <h2>Байес</h2>
        <p>Калькулятор вероятностей Байеса</p>
      </div>
    </a>
    <a class="card" href="gomoku/index.html">
      <div class="card-icon">⚫</div>
      <div class="card-text">
        <h2>Гомоку</h2>
        <p>5 в ряд — онлайн мультиплеер</p>
      </div>
    </a>
    <a class="card" href="qwen-chat/index.html">
      <div class="card-icon">🤖</div>
      <div class="card-text">
        <h2>Qwen Chat</h2>
        <p>Чат с локальной AI (no limits)</p>
      </div>
    </a>
  </div>
  <script>
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }
  </script>
</body>
</html>
